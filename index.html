<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>KSH SUPERVISOR SYSTEM</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/select2-bootstrap-5-theme@1.3.0/dist/select2-bootstrap-5-theme.min.css" />
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    :root { --primary-color: #1e3c72; --accent-color: #6f42c1; --bg-light: #e0e5ec; }
    body { font-family: 'Sarabun', sans-serif; background-color: var(--bg-light); color: #333; }
    .app-header { background: linear-gradient(135deg, var(--primary-color) 0%, var(--accent-color) 100%); color: white; padding: 30px 15px 50px 15px; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; text-align: center; }
    .container-main { max-width: 1100px; margin: -25px auto 20px auto; padding: 0 10px; position: relative; z-index: 10; }
    .nav-pills { background: white; border-radius: 15px; padding: 5px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    .nav-link.active { background: var(--primary-color) !important; color: white !important; }
    .custom-card { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); border-radius: 15px; margin-bottom: 20px; padding: 15px; border: 1px solid rgba(255,255,255,0.8); }
    .card-title-bar { font-weight: 600; color: var(--primary-color); border-bottom: 1px solid rgba(0,0,0,0.05); padding-bottom: 10px; margin-bottom: 15px; }
    .signature-wrapper { border: 2px dashed #ccc; border-radius: 10px; background: white; height: 180px; position: relative; }
    #signaturePad { width: 100%; height: 100%; touch-action: none; }
    #loadingOverlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.9); z-index:9999; flex-direction:column; justify-content:center; align-items:center; }
    #captureArea { position: absolute; left: -9999px; top: 0; width: 800px; background: white; padding: 40px; font-family: 'Sarabun'; }
    .snap-header { text-align: center; border-bottom: 3px solid var(--primary-color); padding-bottom: 15px; margin-bottom: 25px; }
    .snap-section { margin-bottom: 25px; }
    .snap-h3 { font-size: 18px; font-weight: bold; color: var(--accent-color); border-bottom: 1px solid #eee; margin-bottom: 10px; }
    .snap-row { display: flex; margin-bottom: 8px; }
    .snap-label { font-weight: 600; width: 180px; }
    .snap-block { background: #f9f9f9; padding: 15px; border-radius: 8px; border: 1px solid #eee; }
  </style>
</head>
<body>

<div id="loadingOverlay"><div class="spinner-border text-primary"></div><h5 class="mt-3 text-primary fw-bold" id="loadingText">กำลังส่งข้อมูล...</h5></div>

<div id="captureArea">
  <div class="snap-header"><h2>รายงานประจำเวรพยาบาลตรวจการนอกเวลา</h2><p>โรงพยาบาลคอนสาร จังหวัดชัยภูมิ</p></div>
  <div class="snap-section">
    <div class="snap-row"><span class="snap-label">วันที่:</span> <span id="c_date"></span></div>
    <div class="snap-row"><span class="snap-label">เวลา:</span> <span id="c_time"></span></div>
  </div>
  <div class="snap-section"><div class="snap-h3">1. ข้อมูลทั่วไป</div><div class="snap-row"><span class="snap-label">ผู้ตรวจการ:</span> <span id="c_sup"></span></div></div>
  <div class="snap-section"><div class="snap-h3">2. ลายมือชื่อ</div><div class="snap-row"><img id="c_sig_img" style="max-height: 80px;"></div></div>
</div>

<div class="app-header">
  <h2><i class="fas fa-user-shield"></i> KSH SUPERVISOR SYSTEM</h2>
  <p>ระบบบันทึกและออกรายงาน PDF</p>
</div>

<div class="container-main">
  <ul class="nav nav-pills nav-fill mb-3" id="mainNav">
    <li class="nav-item"><button class="nav-link" onclick="showSection('dashboardSection')"><i class="fas fa-home"></i> Home</button></li>
    <li class="nav-item"><button class="nav-link active" onclick="showSection('formSection')"><i class="fas fa-plus-circle"></i> บันทึกเวร</button></li>
    <li class="nav-item"><button class="nav-link" onclick="showSection('tableSection')"><i class="fas fa-list-ul"></i> ประวัติ</button></li>
  </ul>

  <div id="formSection">
    <form id="mainForm" onsubmit="handleFormSubmit(event)">
      <div class="custom-card">
        <div class="card-title-bar">1. ข้อมูลทั่วไป</div>
        <div class="row g-3">
          <div class="col-md-4"><label class="form-label">วันที่</label><input type="date" class="form-control" name="ReportDate" required></div>
          <div class="col-6 col-md-4"><label class="form-label">เวลาเริ่ม</label><input type="time" class="form-control" name="StartTime" required></div>
          <div class="col-6 col-md-4"><label class="form-label">สิ้นสุด</label><input type="time" class="form-control" name="EndTime" required></div>
          <div class="col-md-6"><label class="form-label">ผู้ตรวจการ</label><select class="form-select select2-input" name="SupervisorName" id="supList" required></select></div>
          <div class="col-md-6"><label class="form-label">ตำแหน่ง</label><select class="form-select select2-input" name="Position" id="posList"></select></div>
        </div>
      </div>
      
      <div class="custom-card">
        <div class="card-title-bar">2. สถิติ ER</div>
        <div class="row g-3">
          <div class="col-4"><label class="form-label">รวม</label><input type="number" class="form-control" name="StatER_Total"></div>
          <div class="col-4"><label class="form-label">Refer</label><input type="number" class="form-control" name="StatER_Refer"></div>
          <div class="col-4"><label class="form-label">EMS</label><input type="number" class="form-control" name="StatER_EMS"></div>
        </div>
      </div>

      <div class="custom-card">
        <div class="card-title-bar">11. ลายเซ็น</div>
        <div class="signature-wrapper">
          <button type="button" class="btn btn-sm btn-light border position-absolute top-0 end-0 m-2" onclick="clearSig()">ลบ</button>
          <canvas id="signaturePad"></canvas>
        </div>
      </div>
      <button type="submit" id="submitBtn" class="btn btn-primary w-100 p-3 fw-bold rounded-pill shadow mb-5">บันทึกและออกรายงาน PDF</button>
    </form>
  </div>

  <div id="tableSection" style="display:none;">
    <div class="custom-card"><div class="table-responsive"><table id="dataTable" class="table table-hover w-100">
      <thead><tr><th>วันที่</th><th>ผู้ตรวจการ</th><th>ไฟล์</th><th>จัดการ</th></tr></thead>
      <tbody></tbody>
    </table></div></div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
<script src="//cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
  const API_URL = "ใส่_URL_WEB_APP_ของคุณที่นี่";

  async function handleFormSubmit(e) {
    e.preventDefault();
    if (isSigBlank()) return Swal.fire('กรุณาเซ็นชื่อ', '', 'warning');
    
    $('#loadingOverlay').css('display', 'flex');
    const fd = {}; new FormData(e.target).forEach((v, k) => fd[k] = v);
    
    // 1. เตรียมข้อมูลสำหรับ Capture รูปภาพ
    $('#c_date').text(fd.ReportDate);
    $('#c_time').text(fd.StartTime + " - " + fd.EndTime);
    $('#c_sup').text(fd.SupervisorName);
    const sigBase64 = canvas.toDataURL("image/png");
    $('#c_sig_img').attr('src', sigBase64).show();
    fd.signatureBase64 = sigBase64;

    // 2. ถ่ายรูปหน้าจอ (Image)
    let imageBase64 = "";
    try {
      const cap = await html2canvas(document.getElementById('captureArea'), { scale: 1.5 });
      imageBase64 = cap.toDataURL("image/png");
    } catch(err) { console.log(err); }

    // 3. ส่งเข้า API
    try {
      const r = await fetch(API_URL, { 
        method: 'POST', 
        body: JSON.stringify({ action: 'processForm', formObject: fd, imageBase64: imageBase64 }) 
      });
      const res = await r.json();
      if(res.status === 'success') {
        Swal.fire('สำเร็จ', 'บันทึกข้อมูลเรียบร้อยแล้ว', 'success');
        e.target.reset(); clearSig(); showSection('tableSection');
      }
    } catch(err) { Swal.fire('Error', err.toString(), 'error'); }
    $('#loadingOverlay').hide();
  }

  async function loadTableData() {
    const r = await fetch(API_URL + "?action=getAllRecords");
    const data = await r.json();
    const tbody = $('#dataTable tbody').empty();
    data.forEach(row => {
      const pdf = row.pdfUrl ? `<a href="${row.pdfUrl}" target="_blank" class="btn btn-sm btn-danger">PDF</a>` : '';
      const img = row.imgUrl ? `<a href="${row.imgUrl}" target="_blank" class="btn btn-sm btn-primary">รูป</a>` : '';
      tbody.append(`<tr><td>${row.dateFormatted}</td><td>${row.supervisor}</td><td>${pdf} ${img}</td><td><button class="btn btn-sm btn-light text-danger" onclick="deleteRec('${row.id}')"><i class="fas fa-trash"></i></button></td></tr>`);
    });
  }

  function showSection(id) {
    $('#formSection, #tableSection, #dashboardSection').hide();
    $('#'+id).fadeIn();
    $('.nav-link').removeClass('active');
    if(id === 'tableSection') loadTableData();
    if(id === 'formSection') resizeCanvas();
  }

  async function fetchDropdowns() {
    const r = await fetch(API_URL + "?action=getDropdownOptions");
    const d = await r.json();
    d.supervisors.forEach(v => $('#supList').append(new Option(v, v)));
    d.positions.forEach(v => $('#posList').append(new Option(v, v)));
    $('.select2-input').select2({ theme: 'bootstrap-5', width: '100%' });
  }

  var canvas = document.getElementById('signaturePad'), ctx = canvas.getContext('2d'), drawing = false;
  function resizeCanvas() { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; ctx.lineWidth = 2; ctx.strokeStyle = "#000080"; }
  function getPos(e) { let r = canvas.getBoundingClientRect(); return { x: (e.clientX || e.touches[0].clientX) - r.left, y: (e.clientY || e.touches[0].clientY) - r.top }; }
  canvas.addEventListener('mousedown', e => { drawing = true; ctx.beginPath(); let p = getPos(e); ctx.moveTo(p.x, p.y); });
  canvas.addEventListener('mousemove', e => { if(!drawing) return; let p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); });
  canvas.addEventListener('mouseup', () => drawing = false);
  canvas.addEventListener('touchstart', e => { drawing = true; ctx.beginPath(); let p = getPos(e); ctx.moveTo(p.x, p.y); e.preventDefault(); }, {passive: false});
  canvas.addEventListener('touchmove', e => { if(!drawing) return; let p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); e.preventDefault(); }, {passive: false});
  function clearSig() { ctx.clearRect(0,0,canvas.width,canvas.height); }
  function isSigBlank() { let b = document.createElement('canvas'); b.width = canvas.width; b.height = canvas.height; return canvas.toDataURL() === b.toDataURL(); }

  $(document).ready(() => fetchDropdowns());
</script>
</body>
</html>

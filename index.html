<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>KSH SUPERVISOR SYSTEM</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/select2-bootstrap-5-theme@1.3.0/dist/select2-bootstrap-5-theme.min.css" />
  <style>
    :root { --primary-color: #1e3c72; --accent-color: #6f42c1; --bg-light: #e0e5ec; }
    body { font-family: 'Sarabun', sans-serif; background-color: var(--bg-light); color: #333; -webkit-tap-highlight-color: transparent; }
    .app-header { background: linear-gradient(135deg, var(--primary-color) 0%, var(--accent-color) 100%); color: white; padding: 30px 15px 50px 15px; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; }
    .container-main { max-width: 1100px; margin: -25px auto 20px auto; padding: 0 10px; position: relative; z-index: 10; }
    .nav-pills { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border-radius: 15px; padding: 5px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    .nav-pills .nav-link.active { background: var(--primary-color); color: white; }
    .custom-card { background: rgba(255, 255, 255, 0.7) !important; backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.8); border-radius: 15px; margin-bottom: 20px; padding: 15px; }
    .card-title-bar { font-weight: 600; color: var(--primary-color); border-bottom: 1px solid rgba(0,0,0,0.05); padding-bottom: 10px; margin-bottom: 15px; }
    .signature-wrapper { border: 2px dashed #ced4da; border-radius: 10px; background-color: white; position: relative; overflow: hidden; height: 200px; }
    #signaturePad { width: 100%; height: 100%; touch-action: none; cursor: crosshair; }
    #loadingOverlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.9); z-index:9999; flex-direction:column; justify-content:center; align-items:center; backdrop-filter: blur(4px); }
  </style>
</head>
<body>

<div id="loadingOverlay"><div class="spinner-border text-primary"></div><h5 class="mt-3 text-primary fw-bold">กำลังประมวลผลรายงาน...</h5></div>

<div class="app-header">
  <h2><i class="fas fa-user-shield"></i> KSH SUPERVISOR SYSTEM</h2>
  <p>ระบบบันทึกและออกรายงานผ่าน Google Doc Template</p>
</div>

<div class="container-main">
  <ul class="nav nav-pills nav-fill mb-3" id="mainNav">
    <li class="nav-item"><button class="nav-link active" onclick="showSection('dashboardSection')"><i class="fas fa-home"></i> Home</button></li>
    <li class="nav-item"><button class="nav-link" onclick="showSection('formSection')"><i class="fas fa-plus-circle"></i> บันทึกเวร</button></li>
    <li class="nav-item"><button class="nav-link" onclick="showSection('tableSection')"><i class="fas fa-list-ul"></i> ประวัติ</button></li>
  </ul>

  <div id="dashboardSection">
    <div class="custom-card text-center py-5">
      <h4>ยินดีต้อนรับสู่ระบบตรวจการนอกเวลา</h4>
      <p class="text-muted">เลือกเมนู "บันทึกเวร" เพื่อเริ่มสร้างรายงาน</p>
    </div>
  </div>

  <div id="tableSection" style="display:none;">
    <div class="custom-card">
      <div class="table-responsive">
        <table id="dataTable" class="table table-hover w-100">
          <thead><tr><th>วันที่</th><th>ผู้ตรวจการ</th><th>ไฟล์</th><th>จัดการ</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="formSection" style="display:none;">
    <form id="mainForm" onsubmit="handleFormSubmit(event)">
      <input type="hidden" name="recId" id="recId">
      
      <div class="custom-card">
        <div class="card-title-bar"><i class="fas fa-user-clock"></i> 1. ข้อมูลทั่วไป</div>
        <div class="row g-3">
          <div class="col-md-4"><label class="form-label">วันที่</label><input type="date" class="form-control" name="ReportDate" required></div>
          <div class="col-6 col-md-4"><label class="form-label">เวลาเริ่ม</label><input type="time" class="form-control" name="StartTime" required></div>
          <div class="col-6 col-md-4"><label class="form-label">สิ้นสุด</label><input type="time" class="form-control" name="EndTime" required></div>
          <div class="col-md-6"><label class="form-label">ผู้ตรวจการ</label><select class="form-select select2-input" name="SupervisorName" id="supList" required></select></div>
          <div class="col-md-6"><label class="form-label">ตำแหน่ง</label><select class="form-select select2-input" name="Position" id="posList"></select></div>
        </div>
      </div>

      <div class="custom-card">
        <div class="card-title-bar"><i class="fas fa-ambulance"></i> 2. สถิติ ER & Refer</div>
        <div class="row g-3">
           <div class="col-6"><label class="form-label">ยอดรวม ER</label><input type="number" class="form-control" name="StatER_Total"></div>
           <div class="col-6"><label class="form-label">ยอด Refer</label><input type="number" class="form-control" name="Refer_Total"></div>
           <div class="col-12"><label class="form-label">ปัญหาที่พบ</label><textarea class="form-control" name="Problem_Detail" rows="2"></textarea></div>
        </div>
      </div>

      <div class="custom-card">
        <div class="card-title-bar"><i class="fas fa-signature"></i> ลายมือชื่อผู้รายงาน</div>
        <div class="signature-wrapper mb-2">
          <button type="button" class="btn btn-sm btn-light border position-absolute top-0 end-0 m-2" onclick="clearSignature()">ลบ</button>
          <canvas id="signaturePad"></canvas>
        </div>
      </div>

      <button type="submit" id="submitBtn" class="btn btn-primary w-100 p-3 fw-bold rounded-3 shadow mb-5">บันทึกและออกรายงาน PDF</button>
    </form>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
<script src="//cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
  // ==========================================
  // แก้ไข URL API_URL ของคุณที่นี่
  // ==========================================
  const API_URL = "https://script.google.com/macros/s/AKfycbwLEBU1Ufs2F97tUEn5Jdsiry6q283qWVa-di6oWOckN_6uzQGTlFUrrOcVRszB3Ie9/exec";

  function showSection(id) {
    $('#dashboardSection, #tableSection, #formSection').hide();
    $('#'+id).fadeIn();
    $('.nav-link').removeClass('active');
    $(`button[onclick="showSection('${id}')"]`).addClass('active');
    if(id === 'tableSection') loadTableData();
    if(id === 'formSection') resizeCanvas();
  }

  async function fetchDropdowns() {
    let r = await fetch(API_URL + "?action=getDropdownOptions");
    let d = await r.json();
    d.supervisors.forEach(v => $('#supList').append(new Option(v, v)));
    d.positions.forEach(v => $('#posList').append(new Option(v, v)));
    $('.select2-input').select2({ theme: 'bootstrap-5', width: '100%' });
  }

  async function loadTableData() {
    let r = await fetch(API_URL + "?action=getAllRecords");
    let d = await r.json();
    let tbody = $('#dataTable tbody').empty();
    d.forEach(r => {
      let pdf = r.pdfUrl ? `<a href="${r.pdfUrl}" target="_blank" class="btn btn-sm btn-danger"><i class="fas fa-file-pdf"></i> PDF</a>` : '-';
      tbody.append(`<tr><td>${r.dateFormatted}</td><td>${r.supervisor}</td><td>${pdf}</td><td><button class="btn btn-sm btn-light text-danger" onclick="deleteRecord('${r.id}')"><i class="fas fa-trash"></i></button></td></tr>`);
    });
  }

  async function handleFormSubmit(e) {
    e.preventDefault();
    if (isCanvasBlank(canvas)) return Swal.fire('กรุณาเซ็นชื่อ', '', 'warning');
    
    $('#loadingOverlay').css('display', 'flex');
    let fd = {}; new FormData(e.target).forEach((v, k) => fd[k] = v);
    fd.signatureBase64 = canvas.toDataURL("image/png");

    let r = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'processForm', formObject: fd }) });
    let res = await r.json();
    $('#loadingOverlay').hide();
    if(res.status === 'success') {
      Swal.fire('สำเร็จ', res.message, 'success');
      e.target.reset(); clearSignature(); showSection('tableSection');
    }
  }

  // Signature Pad Logic
  var canvas = document.getElementById('signaturePad'), ctx = canvas.getContext('2d'), drawing = false;
  function resizeCanvas() { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; ctx.lineWidth = 2; ctx.strokeStyle = "#000080"; }
  function getPos(e) { let r = canvas.getBoundingClientRect(); return { x: (e.clientX || e.touches[0].clientX) - r.left, y: (e.clientY || e.touches[0].clientY) - r.top }; }
  canvas.addEventListener('mousedown', e => { drawing = true; let p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); });
  canvas.addEventListener('mousemove', e => { if(!drawing) return; let p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); });
  canvas.addEventListener('mouseup', () => drawing = false);
  canvas.addEventListener('touchstart', e => { drawing = true; let p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); e.preventDefault(); });
  canvas.addEventListener('touchmove', e => { if(!drawing) return; let p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); e.preventDefault(); });
  function clearSignature() { ctx.clearRect(0,0,canvas.width,canvas.height); }
  function isCanvasBlank(c) { let b = document.createElement('canvas'); b.width = c.width; b.height = c.height; return c.toDataURL() === b.toDataURL(); }

  $(document).ready(() => fetchDropdowns());
</script>
</body>
</html>
